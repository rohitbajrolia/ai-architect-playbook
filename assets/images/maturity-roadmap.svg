  <circle cx="330" cy="140" r="14" fill="rgba(255,255,255,0.9)"/>
  <circle cx="550" cy="140" r="14" fill="rgba(255,255,255,0.9)"/>
  <circle cx="770" cy="140" r="14" fill="rgba(255,255,255,0.9)"/>
